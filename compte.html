<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compte - FC Écrouves</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="top-menu">
        <div class="top-left">
          <a class="nav-link" href="index.html">Accueil</a>
          <div class="logo-block"><div class="logo-circle">FCE</div><strong>FC Écrouves</strong></div>
        </div>
        <nav class="top-center">
          <a class="nav-link" href="infos.html">Infos club</a>
          <a class="nav-link" href="reseaux.html">Réseaux sociaux</a>
          <a class="nav-link" href="partenaire.html">Partenaire</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </nav>
        <div class="top-right">
          <a class="icon-link" href="compte.html" title="Mon compte">👤</a>
          <a class="icon-link" href="panier.html" title="Panier">🛍️<span class="icon-badge" id="cart-count">0</span></a>
        </div>
      </div>
      <div class="hero"><h1>Mon compte</h1></div>
    </header>

    <main>
      <section class="card">
        <h2>Connexion / Inscription</h2>
        <p id="session-state" class="message"></p>
        <form id="auth-form">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="joueur@club.fr" required />

          <label for="password">Mot de passe</label>
          <input id="password" type="password" minlength="6" placeholder="6 caractères minimum" required />

          <small>Conseil : utilisez un email valide et un mot de passe d'au moins 6 caractères.</small>

          <div class="auth-actions">
            <button type="submit" class="btn primary" data-mode="login">Se connecter</button>
            <button type="submit" class="btn secondary" data-mode="register">Créer un compte</button>
            <button type="button" id="logout" class="btn muted">Se déconnecter</button>
          </div>
          <p id="auth-message" class="message"></p>
        </form>
      </section>

      <section class="card">
        <h2>Paiement licence</h2>
        <p>Montant annuel : <strong>120 €</strong></p>
        <button id="pay-license" class="btn secondary">Payer ma licence</button>
        <p id="license-message" class="message"></p>
      </section>
    </main>

    <footer><p>© 2026 FC Ecrouves</p></footer>
    <script src="script.js"></script>
  </body>
</html>
